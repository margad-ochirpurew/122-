<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ирээдүйн Өнгө - Мэргэжил Сонголт</title>
    
    <!-- Scripts & Styles -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F8FAFC;
            overflow: hidden;
        }

        .outline-text {
            -webkit-text-stroke: 2px #4f46e5;
            -webkit-text-fill-color: transparent;
        }

        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob {
            animation: blob 7s infinite;
        }
        .animation-delay-2000 {
            animation-delay: 2s;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const DRIVE_IMG = (id) => `https://lh3.googleusercontent.com/d/${id}`;

        const IMAGES = {
            MARGAD_PHOTO: DRIVE_IMG("1RHUwXJI-8UHS5PCWNUJdwqWBCEfH8QV2"),
            TUSS_LOGO: DRIVE_IMG("1ZkV1lVo3HAdlkVLDsiL5nq1awg172er_"),
            SII_LOGO: DRIVE_IMG("128EtP9Q3zqEtSwpv5o1xFSOuZFrsQDxE"),
            MN_LAB_LOGO: DRIVE_IMG("1aoTmqEXwQ4Ee3cMsW8fwOroFNEyqXlxt"),
            QR_CODE: DRIVE_IMG("1l5_CEs37ts75xh_QVEei2i9L1xWMngdH")
        };

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [currentSlide, setCurrentSlide] = useState(0);

            const slides = [
                // 1. INTRO
                {
                    title: "",
                    content: (
                        <div className="flex flex-col md:flex-row items-center gap-12">
                            <div className="flex-1 space-y-6 text-left">
                                <div className="inline-block px-6 py-2 bg-yellow-400 text-black font-black uppercase skew-x-[-15deg] shadow-lg border-2 border-black">
                                    Ирээдүйн өнгө төсөл
                                </div>
                                <h1 className="text-7xl font-black text-slate-900 leading-none">
                                    МЭРГЭЖИЛ <br />
                                    <span className="text-indigo-600 outline-text">СОНГОЛТ</span>
                                </h1>
                                <div className="space-y-4">
                                    <h2 className="text-4xl font-black text-slate-800">О. Маргад</h2>
                                    <div className="flex flex-wrap gap-3">
                                        <span className="bg-indigo-600 text-white px-4 py-2 rounded-xl text-lg font-black shadow-md">M&N Lab-ийн Үүсгэн байгуулагч</span>
                                        <span className="bg-emerald-500 text-white px-4 py-2 rounded-xl text-lg font-black shadow-md">ТУС СОЛЮШН-ийн Түнш</span>
                                        <span className="bg-sky-500 text-white px-4 py-2 rounded-xl text-lg font-black shadow-md">Дата Аналист</span>
                                    </div>
                                </div>
                                <div className="p-6 bg-white border-l-[12px] border-yellow-400 shadow-2xl rounded-r-3xl">
                                    <p className="text-2xl text-slate-700 font-bold italic leading-relaxed">
                                        "Аравдугаар анги бол зөвхөн ЭЕШ биш, энэ бол чиний амьдралын суурь мэдлэг, хүн болох төлөвшлийг олгох лаборатори юм."
                                    </p>
                                </div>
                            </div>
                            <div className="relative w-full max-w-sm">
                                <div className="absolute inset-0 bg-indigo-600 rounded-[3.5rem] rotate-12 scale-105 opacity-10"></div>
                                <div className="relative aspect-[3/4] rounded-[3rem] overflow-hidden border-8 border-white shadow-2xl bg-slate-200">
                                    <img src={IMAGES.MARGAD_PHOTO} className="w-full h-full object-cover" alt="О. Маргад" />
                                </div>
                            </div>
                        </div>
                    )
                },
                // 2. FUTURE
                {
                    title: "2030 ОН: ЮУ ӨӨРЧЛӨГДӨХ ВЭ?",
                    content: (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                            <div className="bg-rose-50 p-10 rounded-[3rem] border-4 border-rose-200 shadow-2xl">
                                <div className="flex items-center gap-6 mb-8 text-rose-500"><Icon name="alert-triangle" size={60} /><h3 className="text-4xl font-black text-rose-900 italic">ЭРСДЭЛ</h3></div>
                                <p className="text-3xl font-black text-rose-800 mb-8">92 сая ажил устана!</p>
                                <ul className="space-y-5 text-rose-700 font-bold text-xl">
                                    <li>❌ Давтагдмал ажлууд</li>
                                    <li>❌ Тооцоолон бодох (AI)</li>
                                    <li>❌ Хэвшмэл бичиг хэрэг</li>
                                </ul>
                            </div>
                            <div className="bg-emerald-50 p-10 rounded-[3rem] border-4 border-emerald-200 shadow-2xl">
                                <div className="flex items-center gap-6 mb-8 text-emerald-500"><Icon name="rocket" size={60} /><h3 className="text-4xl font-black text-emerald-900 italic">БОЛОМЖ</h3></div>
                                <p className="text-3xl font-black text-emerald-800 mb-8">170 сая ШИНЭ ажил!</p>
                                <ul className="space-y-5 text-emerald-700 font-bold text-xl">
                                    <li>✅ Бүтээлч сэтгэлгээ</li>
                                    <li>✅ Эмпати (Хүнлэг чанар)</li>
                                    <li>✅ Ёс суртахууны шүүлт</li>
                                </ul>
                            </div>
                        </div>
                    )
                },
                // 3. CSA
                {
                    title: "ЦЭГЦТЭЙ СЭТГЭХ АРГА (ЦСА)",
                    content: (
                        <div className="space-y-10">
                            <div className="bg-indigo-950 text-white p-10 rounded-[2.5rem] shadow-2xl relative overflow-hidden border-b-8 border-indigo-700">
                                <h3 className="text-3xl font-black mb-6 text-yellow-400 flex items-center gap-4"><Icon name="lightbulb" size={40} /> СЭТГЭЛГЭЭНИЙ ЛАБОРАТОРИ</h3>
                                <p className="text-2xl font-medium leading-relaxed">Сэтгэлгээ гэдэг бол ойлголтуудыг уялдуулан дүгнэлт гаргахад чиглэсэн оюуны үйлдэл юм.</p>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                {[
                                    { n: "01", t: "ӨГӨГДӨЛ", d: "Бодит баримтыг цуглуулах", c: "bg-sky-400" },
                                    { n: "02", t: "ОЙЛГОЛТ", d: "Мэдээллийг өөртэйгөө холбох", c: "bg-yellow-400" },
                                    { n: "03", t: "УХААН", d: "Системтэй шийдвэр гаргах", c: "bg-indigo-500" }
                                ].map((step, i) => (
                                    <div key={i} className="p-10 rounded-[2rem] bg-white border-4 border-slate-900 shadow-[12px_12px_0px_0px_rgba(15,23,42,1)]">
                                        <div className={`w-16 h-16 ${step.c} text-white rounded-2xl flex items-center justify-center mb-6 shadow-lg border-4 border-white`}><span className="text-3xl font-black">{step.n}</span></div>
                                        <h4 className="text-3xl font-black mb-4">{step.t}</h4>
                                        <p className="text-slate-600 font-bold text-lg">{step.d}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )
                },
                // 4. 9 NEEDS
                {
                    title: "ӨӨРИЙГӨӨ ТАНИХ: 9 ХЭРЭГЦЭЭ",
                    content: (
                        <div className="grid grid-cols-3 gap-6">
                            {[
                                { t: "Оршин тогтнох", i: "heart" },
                                { t: "Хамгаалагдах", i: "shield" },
                                { t: "Хайрлах, хайрлуулах", i: "users" },
                                { t: "Ойлгох", i: "brain" },
                                { t: "Оролцох", i: "target" },
                                { t: "Чөлөөт цаг", i: "clock" },
                                { t: "Бүтээх", i: "palette" },
                                { t: "Өөрийгөө тодорхойлох", i: "fingerprint" },
                                { t: "Эрх чөлөө", i: "bird" }
                            ].map((item, i) => (
                                <div key={i} className="bg-white p-8 rounded-[1.5rem] border-4 border-slate-50 shadow-xl flex items-center gap-6 hover:bg-indigo-50 transition-all">
                                    <div className="p-4 bg-indigo-100 text-indigo-600 rounded-2xl"><Icon name={item.i} size={32} /></div>
                                    <h5 className="font-black text-slate-800 text-2xl leading-tight">{item.t}</h5>
                                </div>
                            ))}
                        </div>
                    )
                },
                // 5. SKILL
                {
                    title: "СУРГУУЛИЙН НЭР ҮҮ? УР ЧАДВАР УУ?",
                    content: (
                        <div className="flex flex-col md:flex-row gap-12 items-center">
                            <div className="flex-1 space-y-10">
                                <div className="bg-white p-12 rounded-[4rem] border-4 border-slate-900 shadow-[20px_20px_0px_0px_rgba(16,185,129,1)]">
                                    <h3 className="text-6xl font-black mb-8 leading-tight text-slate-900">УР ЧАДВАР <span className="text-emerald-500 block italic">100% ҮНЭ ЦЭНЭ</span></h3>
                                    <p className="text-3xl font-bold text-slate-700 leading-relaxed">
                                        Ирээдүйд ажил олгогч чиний дипломыг биш, <span className="bg-yellow-300 px-3 py-1 rounded-xl">юу хийж чаддагийг чинь</span> харна.
                                    </p>
                                </div>
                                <div className="space-y-6">
                                    <div className="flex items-center gap-6 p-6 bg-white rounded-[2rem] shadow-lg border-4 border-slate-50">
                                        <Icon name="check-circle" className="text-emerald-500" size={40} />
                                        <span className="text-2xl font-black text-slate-700">Бие даан суралцах чадвар</span>
                                    </div>
                                    <div className="flex items-center gap-6 p-6 bg-white rounded-[2rem] shadow-lg border-4 border-slate-50">
                                        <Icon name="check-circle" className="text-emerald-500" size={40} />
                                        <span className="text-2xl font-black text-slate-700">Өөрт тохирсон ажлын орчин</span>
                                    </div>
                                </div>
                            </div>
                            <div className="w-full max-w-sm hidden md:flex flex-col items-center gap-8 text-[10rem]">🛠️ <div className="text-5xl font-black text-slate-300">↓</div> 🚀</div>
                        </div>
                    )
                },
                // 6. RADAR
                {
                    title: "ХОЛЛАНД КОД (RIASEC)",
                    content: (
                        <div className="flex flex-col md:flex-row items-center gap-16">
                            <div className="w-full md:w-1/2 h-[500px] bg-white p-10 rounded-[3rem] shadow-2xl flex items-center justify-center">
                                <canvas id="hollandChart"></canvas>
                            </div>
                            <div className="flex-1 grid grid-cols-1 gap-6">
                                <h4 className="text-3xl font-black text-slate-900 mb-4">Зургаан хэв шинж:</h4>
                                {[
                                    { l: "R", n: "Бодит", c: "bg-rose-500" },
                                    { l: "I", n: "Судлаач", c: "bg-sky-500" },
                                    { l: "A", n: "Уран бүтээлч", c: "bg-purple-500" },
                                    { l: "S", n: "Нийгмийн", c: "bg-emerald-500" },
                                    { l: "E", n: "Манлайлагч", c: "bg-yellow-500" },
                                    { l: "C", n: "Уламжлалт", c: "bg-slate-500" }
                                ].map((h, i) => (
                                    <div key={i} className="flex items-center gap-6 bg-white p-6 rounded-[1.5rem] shadow-lg border-2 border-slate-100">
                                        <div className={`${h.c} w-14 h-14 rounded-2xl flex items-center justify-center text-white text-2xl font-black shadow-md`}>{h.l}</div>
                                        <span className="text-2xl font-black text-slate-700">{h.n}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )
                },
                // 7. QR
                {
                    title: "СОРИЛ БӨГЛӨХ ЦАГ!",
                    content: (
                        <div className="flex flex-col items-center text-center space-y-16 py-10">
                            <div className="relative">
                                <div className="absolute inset-0 bg-indigo-600 rounded-[4rem] blur-[120px] opacity-25 animate-pulse"></div>
                                <div className="relative bg-white p-14 rounded-[4.5rem] border-[12px] border-slate-900 shadow-[30px_30px_0px_0px_rgba(15,23,42,1)]">
                                    <img src={IMAGES.QR_CODE} className="w-80 h-80 rounded-3xl mb-10 mx-auto object-contain bg-slate-50 border-4 border-slate-100" />
                                    <h3 className="text-6xl font-black text-indigo-600 tracking-tighter">SCAN ME!</h3>
                                </div>
                            </div>
                            <div className="space-y-6">
                                <p className="text-5xl font-black text-slate-900 leading-tight">Өөрийнхөө <span className="text-rose-500 underline decoration-[10px] decoration-rose-100 underline-offset-8">Давамгайлах 3 үсгийг</span> олцгооё!</p>
                                <p className="text-2xl font-bold text-slate-500 italic">"Өөрийгөө таних нь амжилтын 80% юм."</p>
                            </div>
                        </div>
                    )
                }
            ];

            useEffect(() => {
                if (currentSlide === 5) {
                    const ctx = document.getElementById('hollandChart');
                    new Chart(ctx, {
                        type: 'radar',
                        data: {
                            labels: ['R (Бодит)', 'I (Судлаач)', 'A (Уран бүтээлч)', 'S (Нийгмийн)', 'E (Манлайлагч)', 'C (Уламжлалт)'],
                            datasets: [{
                                data: [50, 95, 85, 90, 45, 25],
                                backgroundColor: 'rgba(79, 70, 229, 0.25)',
                                borderColor: 'rgba(79, 70, 229, 1)',
                                borderWidth: 5
                            }]
                        },
                        options: { scales: { r: { beginAtZero: true, max: 100, ticks: { display: false } } }, plugins: { legend: { display: false } } }
                    });
                }
            }, [currentSlide]);

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header with LARGE Logos */}
                    <header className="bg-white border-b-[6px] border-slate-900 px-12 py-10 flex justify-between items-center z-50 shadow-xl">
                        <div className="flex gap-16 items-center">
                            <img src={IMAGES.MN_LAB_LOGO} className="h-24 w-auto" />
                            <div className="h-20 w-[4px] bg-slate-200 rounded-full"></div>
                            <img src={IMAGES.TUSS_LOGO} className="h-24 w-auto" />
                            <img src={IMAGES.SII_LOGO} className="h-24 w-auto" />
                        </div>
                        <div className="px-8 py-3 bg-slate-100 rounded-full font-black text-slate-500 text-2xl uppercase border-2 border-slate-200">
                            {currentSlide + 1} / {slides.length}
                        </div>
                    </header>

                    {/* Content */}
                    <main className="flex-1 flex items-center justify-center px-12 relative">
                        <div className="absolute top-0 -left-20 w-[600px] h-[600px] bg-yellow-100 rounded-full blur-[120px] opacity-30 animate-blob"></div>
                        <div className="absolute bottom-0 -right-20 w-[600px] h-[600px] bg-indigo-100 rounded-full blur-[120px] opacity-30 animate-blob animation-delay-2000"></div>

                        <div className="w-full max-w-7xl relative z-10">
                            {slides[currentSlide].title && (
                                <h2 className="text-6xl font-black text-slate-900 mb-14 inline-block relative">
                                    {slides[currentSlide].title}
                                    <div className="absolute -bottom-4 left-0 w-full h-5 bg-indigo-200 -z-10 rounded-full opacity-60"></div>
                                </h2>
                            )}
                            <div className="animate-in fade-in zoom-in duration-500">
                                {slides[currentSlide].content}
                            </div>
                        </div>
                    </main>

                    {/* Navigation */}
                    <footer className="px-12 py-16 flex justify-between items-center z-50">
                        <button 
                            onClick={() => currentSlide > 0 && setCurrentSlide(currentSlide - 1)}
                            className={`flex items-center gap-6 px-10 py-6 rounded-[2.5rem] font-black text-3xl border-4 border-slate-900 transition-all ${currentSlide === 0 ? 'opacity-30 cursor-not-allowed bg-slate-50' : 'bg-white shadow-[10px_10px_0px_0px_rgba(15,23,42,1)] hover:shadow-none hover:translate-x-1 hover:translate-y-1'}`}
                        >
                            ← ӨМНӨХ
                        </button>
                        <button 
                            onClick={() => currentSlide < slides.length - 1 && setCurrentSlide(currentSlide + 1)}
                            className={`flex items-center gap-6 px-14 py-7 rounded-[2.5rem] font-black text-4xl border-4 border-slate-900 transition-all ${currentSlide === slides.length - 1 ? 'bg-emerald-100 text-emerald-800' : 'bg-yellow-400 shadow-[12px_12px_0px_0px_rgba(15,23,42,1)] hover:shadow-none hover:translate-x-1 hover:translate-y-1'}`}
                        >
                            {currentSlide === slides.length - 1 ? 'ТӨГСГӨЛ' : 'ДАРААХ →'}
                        </button>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
