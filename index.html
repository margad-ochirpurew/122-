<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ирээдүйн Өнгө - Мэргэжил Сонголт</title>
    
    <!-- Nuurka iyo qaabka (Scripts & Styles) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* Qaabka qoraalka (Fonts and Styles) */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F8FAFC;
            overflow-x: hidden;
            height: 100vh;
        }

        .outline-text {
            -webkit-text-stroke: 2px #4f46e5;
            -webkit-text-fill-color: transparent;
        }

        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(20px, -30px) scale(1.05); }
            66% { transform: translate(-10px, 10px) scale(0.95); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob {
            animation: blob 8s infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Qaybta muhiimka ah ee abka (Main App Component)
        const { useState, useEffect, useRef } = React;

        const DRIVE_IMG = (id) => `https://lh3.googleusercontent.com/d/${id}`;

        const IMAGES = {
            MARGAD_PHOTO: DRIVE_IMG("1RHUwXJI-8UHS5PCWNUJdwqWBCEfH8QV2"),
            TUSS_LOGO: DRIVE_IMG("1ZkV1lVo3HAdlkVLDsiL5nq1awg172er_"),
            SII_LOGO: DRIVE_IMG("128EtP9Q3zqEtSwpv5o1xFSOuZFrsQDxE"),
            MN_LAB_LOGO: DRIVE_IMG("1aoTmqEXwQ4Ee3cMsW8fwOroFNEyqXlxt"),
            // Xidhiidhka QR code-ka cusub (New updated QR code link)
            QR_CODE: DRIVE_IMG("1jDAlwpuNRiyQhfaj21Fffhp7b_6vghOQ")
        };

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [currentSlide, setCurrentSlide] = useState(0);
            const chartRef = useRef(null);

            // Xogta bogagga (Slides data)
            const slides = [
                {
                    title: "",
                    content: (
                        <div className="flex flex-col md:flex-row items-center gap-6 lg:gap-12">
                            <div className="flex-1 space-y-4 text-left">
                                <div className="inline-block px-4 py-1 bg-yellow-400 text-black font-black uppercase skew-x-[-15deg] shadow-md border-2 border-black text-sm">
                                    Ирээдүйн өнгө төсөл
                                </div>
                                <h1 className="text-5xl lg:text-7xl font-black text-slate-900 leading-tight">
                                    МЭРГЭЖИЛ <br />
                                    <span className="text-indigo-600 outline-text">СОНГОЛТ</span>
                                </h1>
                                <div className="space-y-3">
                                    <h2 className="text-3xl font-black text-slate-800">О. Маргад</h2>
                                    <div className="flex flex-wrap gap-2">
                                        <span className="bg-indigo-600 text-white px-3 py-1 rounded-lg text-sm font-black shadow-sm">M&N Lab-ийн Үүсгэн байгуулагч</span>
                                        <span className="bg-emerald-500 text-white px-3 py-1 rounded-lg text-sm font-black shadow-sm">ТУС СОЛЮШН-ийн Түнш</span>
                                        <span className="bg-sky-500 text-white px-3 py-1 rounded-lg text-sm font-black shadow-sm">Дата Аналист</span>
                                    </div>
                                </div>
                                <div className="p-4 lg:p-6 bg-white border-l-[10px] border-yellow-400 shadow-xl rounded-r-2xl border-y border-r border-slate-100">
                                    <p className="text-lg lg:text-xl text-slate-700 font-bold italic leading-relaxed">
                                        "Ерөнхий боловсролын сургууль  бол зөвхөн ЭЕШ биш, энэ бол чиний амьдралын суурь мэдлэг, хүн болох төлөвшлийг олгох лаборатори юм."
                                    </p>
                                </div>
                            </div>
                            <div className="relative w-64 lg:w-80 shrink-0">
                                <div className="absolute inset-0 bg-indigo-600 rounded-[3rem] rotate-6 scale-105 opacity-10"></div>
                                <div className="relative aspect-[3/4] rounded-[2.5rem] overflow-hidden border-4 lg:border-8 border-white shadow-2xl bg-slate-200">
                                    <img src={IMAGES.MARGAD_PHOTO} className="w-full h-full object-cover" alt="Margad" />
                                </div>
                            </div>
                        </div>
                    )
                },
                {
                    title: "2030 ОН: ЮУ ӨӨРЧЛӨГДӨХ ВЭ?",
                    content: (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 lg:gap-10">
                            <div className="bg-rose-50 p-6 lg:p-10 rounded-[2.5rem] border-4 border-rose-200 shadow-lg">
                                <div className="flex items-center gap-4 mb-4 text-rose-500"><Icon name="alert-triangle" size={40} /><h3 className="text-3xl font-black text-rose-900 italic">ЭРСДЭЛ</h3></div>
                                <p className="text-2xl font-black text-rose-800 mb-4">92 сая ажил устана!</p>
                                <ul className="space-y-3 text-rose-700 font-bold text-lg">
                                    <li className="flex items-center gap-2"><Icon name="x-circle" size={20}/> Давтагдмал ажлууд</li>
                                    <li className="flex items-center gap-2"><Icon name="x-circle" size={20}/> Тооцоолон бодох (AI)</li>
                                    <li className="flex items-center gap-2"><Icon name="x-circle" size={20}/> Хэвшмэл бичиг хэрэг</li>
                                </ul>
                            </div>
                            <div className="bg-emerald-50 p-6 lg:p-10 rounded-[2.5rem] border-4 border-emerald-200 shadow-lg">
                                <div className="flex items-center gap-4 mb-4 text-emerald-500"><Icon name="rocket" size={40} /><h3 className="text-3xl font-black text-emerald-900 italic">БОЛОМЖ</h3></div>
                                <p className="text-2xl font-black text-emerald-800 mb-4">170 сая ШИНЭ ажил!</p>
                                <ul className="space-y-3 text-emerald-700 font-bold text-lg">
                                    <li className="flex items-center gap-2"><Icon name="check-circle" size={20}/> Бүтээлч сэтгэлгээ</li>
                                    <li className="flex items-center gap-2"><Icon name="check-circle" size={20}/> Эмпати (Хүнлэг чанар)</li>
                                    <li className="flex items-center gap-2"><Icon name="check-circle" size={20}/> Ёс суртахууны шүүлт</li>
                                </ul>
                            </div>
                        </div>
                    )
                },
                {
                    title: "ЦЭГЦТЭЙ СЭТГЭХ АРГА (ЦСА)",
                    content: (
                        <div className="space-y-6">
                            <div className="bg-indigo-950 text-white p-6 rounded-[2rem] shadow-xl relative overflow-hidden border-b-4 border-indigo-700">
                                <h3 className="text-2xl font-black mb-2 text-yellow-400 flex items-center gap-3"><Icon name="lightbulb" size={30} /> СЭТГЭЛГЭЭНИЙ ЛАБОРАТОРИ</h3>
                                <p className="text-xl font-medium">Сэтгэлгээ гэдэг бол ойлголтуудыг уялдуулан дүгнэлт гаргахад чиглэсэн оюуны үйлдэл юм.</p>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                {[
                                    { n: "01", t: "ӨГӨГДӨЛ", d: "Бодит баримтыг цуглуулах", c: "bg-sky-400" },
                                    { n: "02", t: "ОЙЛГОЛТ", d: "Мэдээллийг өөртэйгөө холбох", c: "bg-yellow-400" },
                                    { n: "03", t: "УХААН", d: "Системтэй шийдвэр гаргах", c: "bg-indigo-500" }
                                ].map((step, i) => (
                                    <div key={i} className="p-6 rounded-[1.5rem] bg-white border-2 border-slate-900 shadow-[8px_8px_0px_0px_rgba(15,23,42,1)]">
                                        <div className={`w-12 h-12 ${step.c} text-white rounded-xl flex items-center justify-center mb-4 border-2 border-white`}><span className="text-xl font-black">{step.n}</span></div>
                                        <h4 className="text-2xl font-black mb-1">{step.t}</h4>
                                        <p className="text-slate-600 font-bold">{step.d}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )
                },
                {
                    title: "ӨӨРИЙГӨӨ ТАНИХ: 9 ХЭРЭГЦЭЭ",
                    content: (
                        <div className="grid grid-cols-3 gap-4 lg:gap-6">
                            {[
                                { t: "Оршин тогтнох", i: "heart" },
                                { t: "Хамгаалагдах", i: "shield" },
                                { t: "Хайрлах, хайрлуулах", i: "users" },
                                { t: "Ойлгох", i: "brain" },
                                { t: "Оролцох", i: "target" },
                                { t: "Чөлөөт цаг", i: "clock" },
                                { t: "Бүтээх", i: "palette" },
                                { t: "Өөрийгөө тодорхойлох", i: "fingerprint" },
                                { t: "Эрх чөлөө", i: "bird" }
                            ].map((item, i) => (
                                <div key={i} className="bg-white p-4 lg:p-6 rounded-[1.2rem] border-2 border-slate-50 shadow-md flex items-center gap-4 hover:bg-indigo-50 transition-all cursor-default">
                                    <div className="p-2 lg:p-3 bg-indigo-100 text-indigo-600 rounded-xl flex-shrink-0"><Icon name={item.i} size={24} /></div>
                                    <h5 className="font-black text-slate-800 text-lg leading-tight">{item.t}</h5>
                                </div>
                            ))}
                        </div>
                    )
                },
                {
                    title: "СУРГУУЛИЙН НЭР ҮҮ? УР ЧАДВАР УУ?",
                    content: (
                        <div className="flex flex-col md:flex-row gap-8 items-center">
                            <div className="flex-1 space-y-6">
                                <div className="bg-white p-8 rounded-[3rem] border-4 border-slate-900 shadow-[12px_12px_0px_0px_rgba(16,185,129,1)]">
                                    <h3 className="text-4xl lg:text-5xl font-black mb-4 text-slate-900">УР ЧАДВАР <span className="text-emerald-500 block italic">100% ҮНЭ ЦЭНЭ</span></h3>
                                    <p className="text-2xl font-bold text-slate-700">Ирээдүйд ажил олгогч чиний дипломыг биш, <span className="bg-yellow-300 px-2 rounded-lg">юу хийж чаддагийг чинь</span> харна.</p>
                                </div>
                                <div className="grid grid-cols-1 gap-3">
                                    <div className="flex items-center gap-4 p-4 bg-white rounded-2xl shadow-md border border-slate-100">
                                        <Icon name="check-circle" className="text-emerald-500" size={30} />
                                        <span className="text-xl font-black text-slate-700">Бие даан суралцах чадвар</span>
                                    </div>
                                    <div className="flex items-center gap-4 p-4 bg-white rounded-2xl shadow-md border border-slate-100">
                                        <Icon name="check-circle" className="text-emerald-500" size={30} />
                                        <span className="text-xl font-black text-slate-700">Өөрт тохирсон ажлын орчин</span>
                                    </div>
                                </div>
                            </div>
                            <div className="w-1/3 hidden md:flex flex-col items-center gap-4 text-8xl grayscale opacity-20">🛠️ ➔ 🚀</div>
                        </div>
                    )
                },
                {
                    title: "ХОЛЛАНД КОД (RIASEC)",
                    content: (
                        <div className="flex flex-col md:flex-row items-center gap-8">
                            <div className="w-full md:w-1/2 h-80 lg:h-96 bg-white p-6 rounded-[2rem] shadow-lg flex items-center justify-center">
                                <canvas id="hollandChart"></canvas>
                            </div>
                            <div className="flex-1 grid grid-cols-2 gap-3">
                                {[
                                    { l: "R", n: "Бодит", c: "bg-rose-500" },
                                    { l: "I", n: "Судлаач", c: "bg-sky-500" },
                                    { l: "A", n: "Уран бүтээлч", c: "bg-purple-500" },
                                    { l: "S", n: "Нийгмийн", c: "bg-emerald-500" },
                                    { l: "E", n: "Манлайлагч", c: "bg-yellow-500" },
                                    { l: "C", n: "Уламжлалт", c: "bg-slate-500" }
                                ].map((h, i) => (
                                    <div key={i} className="flex items-center gap-3 bg-white p-3 rounded-xl shadow border border-slate-50">
                                        <div className={`${h.c} w-8 h-8 rounded-lg flex-shrink-0 flex items-center justify-center text-white font-black text-sm`}>{h.l}</div>
                                        <span className="text-sm font-black text-slate-700">{h.n}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )
                },
                {
                    title: "СОРИЛ БӨГЛӨХ ЦАГ!",
                    content: (
                        <div className="flex flex-col items-center text-center space-y-6">
                            <div className="relative">
                                <div className="absolute inset-0 bg-indigo-600 rounded-[3rem] blur-[80px] opacity-10 animate-pulse"></div>
                                <div className="relative bg-white p-8 rounded-[3.5rem] border-[10px] border-slate-900 shadow-[20px_20px_0px_0px_rgba(15,23,42,1)]">
                                    <img src={IMAGES.QR_CODE} className="w-64 h-64 rounded-2xl mb-4 mx-auto object-contain bg-slate-50" alt="QR" />
                                    <h3 className="text-4xl font-black text-indigo-600 tracking-tighter">SCAN ME!</h3>
                                </div>
                            </div>
                            <div className="space-y-2">
                                <p className="text-3xl font-black text-slate-900 leading-tight">Өөрийнхөө <span className="text-rose-500 underline decoration-4 underline-offset-4">Давамгайлах 3 үсгийг</span> олцгооё!</p>
                                <p className="text-xl font-bold text-slate-400 italic">"Өөрийгөө таних нь амжилтын 80% юм."</p>
                            </div>
                        </div>
                    )
                }
            ];

            // Shaqidaha lagu badalayo bogagga (Navigation functions)
            const nextSlide = () => {
                if (currentSlide < slides.length - 1) {
                    setCurrentSlide(currentSlide + 1);
                }
            };

            const prevSlide = () => {
                if (currentSlide > 0) {
                    setCurrentSlide(currentSlide - 1);
                }
            };

            // Dhagaysiga kiiboodhka (Keyboard listeners)
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'ArrowRight') nextSlide();
                    if (e.key === 'ArrowLeft') prevSlide();
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [currentSlide]);

            // Diyaarinta jaantuska (Chart initialization)
            useEffect(() => {
                if (currentSlide === 5) {
                    const ctx = document.getElementById('hollandChart');
                    if (chartRef.current) chartRef.current.destroy();
                    chartRef.current = new Chart(ctx, {
                        type: 'radar',
                        data: {
                            labels: ['R (Бодит)', 'I (Судлаач)', 'A (Уран бүтээлч)', 'S (Нийгмийн)', 'E (Манлайлагч)', 'C (Уламжлалт)'],
                            datasets: [{
                                data: [50, 95, 85, 90, 45, 25],
                                backgroundColor: 'rgba(79, 70, 229, 0.2)',
                                borderColor: 'rgba(79, 70, 229, 1)',
                                borderWidth: 4,
                                pointRadius: 4
                            }]
                        },
                        options: { 
                            responsive: true,
                            maintainAspectRatio: false,
                            scales: { r: { beginAtZero: true, max: 100, ticks: { display: false } } }, 
                            plugins: { legend: { display: false } } 
                        }
                    });
                }
            }, [currentSlide]);

            return (
                <div className="h-screen flex flex-col overflow-hidden">
                    {/* Madaxa (Header) */}
                    <header className="bg-white border-b-4 border-slate-900 px-6 py-4 flex justify-between items-center shrink-0">
                        <div className="flex gap-6 lg:gap-12 items-center">
                            <img src={IMAGES.MN_LAB_LOGO} className="h-12 lg:h-16 w-auto" alt="MN" />
                            <div className="h-10 w-0.5 bg-slate-200 hidden sm:block"></div>
                            <img src={IMAGES.TUSS_LOGO} className="h-12 lg:h-16 w-auto" alt="TUSS" />
                            <img src={IMAGES.SII_LOGO} className="h-12 lg:h-16 w-auto" alt="SII" />
                        </div>
                        <div className="hidden sm:block px-4 py-1.5 bg-slate-100 rounded-full font-black text-slate-500 text-lg border-2 border-slate-200">
                            {currentSlide + 1} / {slides.length}
                        </div>
                    </header>

                    {/* Qaybta dhexe (Main Content) */}
                    <main className="flex-1 flex items-center justify-center px-6 lg:px-12 relative overflow-hidden">
                        <div className="absolute top-0 -left-20 w-[400px] h-[400px] bg-yellow-50 rounded-full blur-[100px] opacity-40 animate-blob"></div>
                        <div className="absolute bottom-0 -right-20 w-[400px] h-[400px] bg-indigo-50 rounded-full blur-[100px] opacity-40 animate-blob animation-delay-2000"></div>

                        <div className="w-full max-w-6xl relative z-10 py-2">
                            {slides[currentSlide].title && (
                                <h2 className="text-3xl lg:text-5xl font-black text-slate-900 mb-6 lg:mb-10 inline-block relative">
                                    {slides[currentSlide].title}
                                    <div className="absolute -bottom-2 left-0 w-full h-3 bg-indigo-100 -z-10 opacity-70"></div>
                                </h2>
                            )}
                            <div className="transition-all duration-500 transform ease-out">
                                {slides[currentSlide].content}
                            </div>
                        </div>
                    </main>

                    {/* Badhamada hoose (Navigation Buttons) */}
                    <footer className="px-6 py-6 lg:py-10 flex justify-between items-center shrink-0 bg-white/50 backdrop-blur-sm">
                        <button 
                            onClick={prevSlide}
                            disabled={currentSlide === 0}
                            className={`flex items-center gap-3 px-6 py-3 rounded-2xl font-black text-xl border-[3px] border-slate-900 transition-all ${currentSlide === 0 ? 'opacity-20 cursor-not-allowed bg-slate-100' : 'bg-white shadow-[6px_6px_0px_0px_rgba(15,23,42,1)] active:shadow-none active:translate-x-1 active:translate-y-1'}`}
                        >
                            <Icon name="arrow-left" size={24} className="stroke-[3px]"/> ӨМНӨХ
                        </button>

                        <div className="hidden lg:flex gap-4">
                            {slides.map((_, i) => (
                                <div key={i} className={`h-3 rounded-full transition-all duration-500 ${currentSlide === i ? 'w-12 bg-indigo-600' : 'w-3 bg-slate-200'}`}></div>
                            ))}
                        </div>

                        <button 
                            onClick={nextSlide}
                            disabled={currentSlide === slides.length - 1}
                            className={`flex items-center gap-3 px-10 py-4 rounded-2xl font-black text-2xl border-[3px] border-slate-900 transition-all ${currentSlide === slides.length - 1 ? 'bg-emerald-100 text-emerald-800 border-emerald-300' : 'bg-yellow-400 shadow-[8px_8px_0px_0px_rgba(15,23,42,1)] active:shadow-none active:translate-x-1 active:translate-y-1'}`}
                        >
                            {currentSlide === slides.length - 1 ? 'ТӨГСГӨЛ' : 'ДАРААХ'} <Icon name="arrow-right" size={28} className="stroke-[3px]"/>
                        </button>
                    </footer>
                </div>
            );
        };

        // Bilowga abka (App mounting)
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
